# openspec/config.yaml
# Hotel Market Pro — Corporate Business Hotel Hub
schema: spec-driven

context: |
  Tech stack: Next.js 15 (App Router), TypeScript 5.7, Tailwind CSS 3.4, next-intl 4 (i18n)
  Architecture: Corporate website / business hotel hub (SSG with static pages)
  Testing: Vitest + @testing-library/react — configured
  Style: Prettier, standard Next.js/React conventions, commitlint for conventional commits

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Consider SEO, performance, and accessibility requirements
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
